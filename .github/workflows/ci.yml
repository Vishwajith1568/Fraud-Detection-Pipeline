name: Fraud Detection Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Unit Tests ──
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/detector

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: python -m pytest test_detection.py -v --cov=detection_engine --cov-report=term-missing --cov-report=xml:../../coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── JOB 2: Build Docker Images ──
  build-images:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build detector image
        run: docker build -t fraud-detector ./services/detector

      - name: Build generator image
        run: docker build -t fraud-generator ./services/generator

      - name: Build web-backend image
        run: docker build -t fraud-web-backend ./services/web-backend

      - name: Build frontend-dashboard image
        run: docker build -t fraud-frontend ./frontend-dashboard

      - name: Verify all images built
        run: |
          echo "Successfully built images:"
          docker images --format "  {{.Repository}}:{{.Tag}} ({{.Size}})" | grep fraud

  # ── JOB 3: Push to Docker Hub (only on main branch) ──
  push-images:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push detector
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detector:latest ./services/detector
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detector:latest

      - name: Build and push generator
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fraud-generator:latest ./services/generator
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-generator:latest

      - name: Build and push web-backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fraud-web-backend:latest ./services/web-backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-web-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fraud-frontend:latest ./frontend-dashboard
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-frontend:latest